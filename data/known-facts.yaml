# known-facts.yaml — 검증된 fact 화이트리스트
#
# 글에 등장하는 spec/product/standard 이름이 *여기 등재*되어 있어야 합니다.
# 등재되지 않은 것은 *수동 review 필요* 신호.
#
# 등재 규칙:
#   - 공개 자료(공식 spec PDF·datasheet·release note)에서 직접 확인된 것만
#   - 신규 항목 추가 시 출처 comment 필수
#
# 사용: scripts/verify-known-facts.sh가 이 파일을 읽어 검증

# ─── JEDEC 표준 ────────────────────────────────────────────────
jedec_standards:
  - JESD235      # HBM (2013, 1.0 Gbps × 1024-bit)
  - JESD235A     # HBM2 (2016)
  - JESD235B     # HBM2 update
  - JESD235C     # HBM2E (2020)
  - JESD238      # HBM3 (2022)
  - JESD238A     # HBM3 update (2024)
  - JESD209      # LPDDR base
  - JESD209-2    # LPDDR2
  - JESD209-3    # LPDDR3
  - JESD209-4    # LPDDR4 (JESD209-4 / 4B 등)
  - JESD209-4B
  - JESD209-5    # LPDDR5
  - JESD79       # DDR base
  - JESD79-4     # DDR4
  - JESD79-5     # DDR5
  # Note: HBM3E는 별도 표준 번호 없이 JESD238 update로 다룸
  # HBM4는 2024~2025 표준화 진행, 번호 미부여

# ─── PCI-SIG / CXL Consortium 표준 ────────────────────────────
pcie_standards:
  - PCI-SIG ECN  # generic
  - CXL 1.0
  - CXL 1.1
  - CXL 2.0
  - CXL 3.0
  - CXL 3.1
  - CXL 3.2

# ─── DMTF / SPDM ───────────────────────────────────────────────
dmtf_standards:
  - DSP0274      # SPDM (Security Protocol Data Model)
  - DSP0276      # SPDM Secured Messages
  - DSP0277      # SPDM over MCTP Binding

# ─── IEEE 802.1 TSN ────────────────────────────────────────────
ieee_802_1_tsn:
  - IEEE 802.1AS        # gPTP
  - IEEE 802.1AS-2020   # gPTP Rev
  - IEEE 802.1Qbv       # Time-Aware Shaper
  - IEEE 802.1Qbu       # Frame Preemption
  - IEEE 802.1Qci       # Per-Stream Filtering
  - IEEE 802.1Qcc       # Stream Reservation
  - IEEE 802.1CB        # FRER
  - IEEE 802.1CB-2018

# ─── Industrial Ethernet 프로토콜 ─────────────────────────────
industrial_ethernet:
  - EtherCAT             # ETG
  - PROFINET             # PI
  - EtherNet/IP          # ODVA
  - POWERLINK            # EPSG
  - SERCOS III           # IGS
  - Modbus TCP

