<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#282a36" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f8f8f2" font-size="18" font-weight="bold">Chroma Subsampling Patterns</text>

  <!-- Legend -->
  <g transform="translate(250, 52)">
    <circle cx="0" cy="0" r="7" fill="#50fa7b" opacity="0.9"/>
    <text x="14" y="5" fill="#f8f8f2" font-size="12">Luma (Y) sample</text>
    <circle cx="170" cy="0" r="7" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <text x="184" y="5" fill="#f8f8f2" font-size="12">Chroma (Cb/Cr) sample</text>
  </g>

  <!-- Grid cell size: 40x40, 4 columns x 2 rows = 160x80 -->
  <!-- 3 grids with spacing. Total = 3*160 + 2*80 = 640, offset = (800-640)/2 = 80 -->

  <!-- === 4:4:4 === -->
  <g transform="translate(80, 95)">
    <text x="80" y="0" text-anchor="middle" fill="#bd93f9" font-size="16" font-weight="bold">4:4:4</text>
    <text x="80" y="18" text-anchor="middle" fill="#6272a4" font-size="11">No subsampling</text>

    <!-- Grid background -->
    <rect x="0" y="30" width="160" height="80" rx="3" fill="#343746" stroke="#6272a4" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="30" x2="40" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="80" y1="30" x2="80" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="120" y1="30" x2="120" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="70" x2="160" y2="70" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>

    <!-- Luma samples (all 8 positions) - filled green circles -->
    <circle cx="20" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="60" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="100" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="140" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="20" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="60" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="100" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="140" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>

    <!-- Chroma samples (all 8 positions) - hollow pink circles -->
    <circle cx="20" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="60" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="100" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="140" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="20" cy="90" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="60" cy="90" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="100" cy="90" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="140" cy="90" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>

    <!-- Chroma ratio -->
    <text x="80" y="135" text-anchor="middle" fill="#ffb86c" font-size="12">Chroma: 100%</text>
    <text x="80" y="152" text-anchor="middle" fill="#6272a4" font-size="11">8 luma + 8 chroma</text>
  </g>

  <!-- === 4:2:2 === -->
  <g transform="translate(320, 95)">
    <text x="80" y="0" text-anchor="middle" fill="#bd93f9" font-size="16" font-weight="bold">4:2:2</text>
    <text x="80" y="18" text-anchor="middle" fill="#6272a4" font-size="11">Horizontal half</text>

    <!-- Grid background -->
    <rect x="0" y="30" width="160" height="80" rx="3" fill="#343746" stroke="#6272a4" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="30" x2="40" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="80" y1="30" x2="80" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="120" y1="30" x2="120" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="70" x2="160" y2="70" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>

    <!-- Luma samples (all 8 positions) -->
    <circle cx="20" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="60" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="100" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="140" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="20" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="60" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="100" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="140" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>

    <!-- Chroma samples (every other column: cols 0 and 2) -->
    <circle cx="20" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="100" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="20" cy="90" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="100" cy="90" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>

    <!-- Missing chroma indicators -->
    <circle cx="60" cy="50" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="140" cy="50" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="60" cy="90" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="140" cy="90" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

    <!-- Chroma ratio -->
    <text x="80" y="135" text-anchor="middle" fill="#ffb86c" font-size="12">Chroma: 50%</text>
    <text x="80" y="152" text-anchor="middle" fill="#6272a4" font-size="11">8 luma + 4 chroma</text>
  </g>

  <!-- === 4:2:0 === -->
  <g transform="translate(560, 95)">
    <text x="80" y="0" text-anchor="middle" fill="#bd93f9" font-size="16" font-weight="bold">4:2:0</text>
    <text x="80" y="18" text-anchor="middle" fill="#6272a4" font-size="11">Half both axes</text>

    <!-- Grid background -->
    <rect x="0" y="30" width="160" height="80" rx="3" fill="#343746" stroke="#6272a4" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="40" y1="30" x2="40" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="80" y1="30" x2="80" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="120" y1="30" x2="120" y2="110" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="70" x2="160" y2="70" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3"/>

    <!-- Luma samples (all 8 positions) -->
    <circle cx="20" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="60" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="100" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="140" cy="50" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="20" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="60" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="100" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>
    <circle cx="140" cy="90" r="7" fill="#50fa7b" opacity="0.9"/>

    <!-- Chroma samples (every other column AND every other row: only row 0, cols 0 and 2) -->
    <circle cx="20" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>
    <circle cx="100" cy="50" r="13" fill="none" stroke="#ff79c6" stroke-width="2.5"/>

    <!-- Missing chroma indicators -->
    <circle cx="60" cy="50" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="140" cy="50" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="20" cy="90" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="60" cy="90" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="100" cy="90" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="140" cy="90" r="13" fill="none" stroke="#6272a4" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

    <!-- Chroma ratio -->
    <text x="80" y="135" text-anchor="middle" fill="#ffb86c" font-size="12">Chroma: 25%</text>
    <text x="80" y="152" text-anchor="middle" fill="#6272a4" font-size="11">8 luma + 2 chroma</text>
  </g>

  <!-- Data savings summary bar -->
  <g transform="translate(80, 280)">
    <text x="0" y="0" fill="#f8f8f2" font-size="12" font-weight="bold">Data per pixel block (4x2):</text>

    <!-- 4:4:4 bar -->
    <rect x="0" y="15" width="640" height="20" rx="3" fill="#343746" stroke="#6272a4" stroke-width="0.5"/>
    <rect x="0" y="15" width="640" height="20" rx="3" fill="#bd93f9" opacity="0.3"/>
    <text x="320" y="30" text-anchor="middle" fill="#f8f8f2" font-size="11">4:4:4 -- 24 samples (0% saved)</text>

    <!-- 4:2:2 bar -->
    <rect x="0" y="40" width="427" height="20" rx="3" fill="#343746" stroke="#6272a4" stroke-width="0.5"/>
    <rect x="0" y="40" width="427" height="20" rx="3" fill="#8be9fd" opacity="0.3"/>
    <text x="213" y="55" text-anchor="middle" fill="#f8f8f2" font-size="11">4:2:2 -- 16 samples (33% saved)</text>

    <!-- 4:2:0 bar -->
    <rect x="0" y="65" width="320" height="20" rx="3" fill="#343746" stroke="#6272a4" stroke-width="0.5"/>
    <rect x="0" y="65" width="320" height="20" rx="3" fill="#50fa7b" opacity="0.3"/>
    <text x="160" y="80" text-anchor="middle" fill="#f8f8f2" font-size="11">4:2:0 -- 12 samples (50% saved)</text>
  </g>
</svg>