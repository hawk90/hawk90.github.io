<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <linearGradient id="rawBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#ff79c6"/>
    </linearGradient>
    <linearGradient id="h264Bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="100%" stop-color="#f1fa8c"/>
    </linearGradient>
    <linearGradient id="h265Bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#bd93f9"/>
    </linearGradient>
    <linearGradient id="av1Bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50fa7b"/>
      <stop offset="100%" stop-color="#8be9fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#282a36" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f8f8f2" font-size="18" font-weight="bold">Bitrate Comparison: 4K 30fps Video</text>
  <text x="400" y="52" text-anchor="middle" fill="#6272a4" font-size="12">Logarithmic scale -- note the massive difference</text>

  <!-- Chart area -->
  <!-- Y axis labels on left, bars extend right -->
  <!-- Using log scale: log10(12000)=4.08, log10(30)=1.48, log10(15)=1.18, log10(10)=1.0 -->
  <!-- Map log range [0, 4.2] to pixel range [0, 480] -->
  <!-- barMaxWidth = 480, logMax = 4.2, scale = 480/4.2 = 114.3 px per log unit -->

  <g transform="translate(180, 80)">
    <!-- Axis -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#6272a4" stroke-width="1.5"/>
    <line x1="0" y1="280" x2="520" y2="280" stroke="#6272a4" stroke-width="1.5"/>

    <!-- Log scale grid lines and labels -->
    <!-- 1 Mbps: log10(1)=0, x=0 -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
    <text x="0" y="298" text-anchor="middle" fill="#6272a4" font-size="10">1 Mbps</text>

    <!-- 10 Mbps: log10(10)=1, x=114.3 -->
    <line x1="114" y1="0" x2="114" y2="280" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
    <text x="114" y="298" text-anchor="middle" fill="#6272a4" font-size="10">10</text>

    <!-- 100 Mbps: log10(100)=2, x=228.6 -->
    <line x1="229" y1="0" x2="229" y2="280" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
    <text x="229" y="298" text-anchor="middle" fill="#6272a4" font-size="10">100</text>

    <!-- 1 Gbps = 1000 Mbps: log10(1000)=3, x=342.9 -->
    <line x1="343" y1="0" x2="343" y2="280" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
    <text x="343" y="298" text-anchor="middle" fill="#6272a4" font-size="10">1 Gbps</text>

    <!-- 10 Gbps = 10000 Mbps: log10(10000)=4, x=457.1 -->
    <line x1="457" y1="0" x2="457" y2="280" stroke="#6272a4" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
    <text x="457" y="298" text-anchor="middle" fill="#6272a4" font-size="10">10 Gbps</text>

    <!-- Scale label -->
    <text x="260" y="320" text-anchor="middle" fill="#6272a4" font-size="11">Logarithmic Scale (Mbps)</text>

    <!-- === Bar 1: Raw 4K 30fps ~12,000 Mbps === -->
    <!-- log10(12000) = 4.079, x = 4.079 * 114.3 = 466 -->
    <g transform="translate(0, 15)">
      <text x="-10" y="18" text-anchor="end" fill="#ff5555" font-size="13" font-weight="bold">Raw 4K</text>
      <rect x="0" y="4" width="466" height="28" rx="4" fill="url(#rawBar)" opacity="0.85"/>
      <text x="472" y="24" text-anchor="start" fill="#ff79c6" font-size="12" font-weight="bold">~12 Gbps</text>
    </g>

    <!-- === Bar 2: H.264 ~30 Mbps === -->
    <!-- log10(30) = 1.477, x = 1.477 * 114.3 = 169 -->
    <g transform="translate(0, 80)">
      <text x="-10" y="18" text-anchor="end" fill="#ffb86c" font-size="13" font-weight="bold">H.264</text>
      <rect x="0" y="4" width="169" height="28" rx="4" fill="url(#h264Bar)" opacity="0.85"/>
      <text x="175" y="24" text-anchor="start" fill="#f1fa8c" font-size="12" font-weight="bold">~30 Mbps</text>
    </g>

    <!-- === Bar 3: H.265 ~15 Mbps === -->
    <!-- log10(15) = 1.176, x = 1.176 * 114.3 = 134 -->
    <g transform="translate(0, 145)">
      <text x="-10" y="18" text-anchor="end" fill="#8be9fd" font-size="13" font-weight="bold">H.265</text>
      <rect x="0" y="4" width="134" height="28" rx="4" fill="url(#h265Bar)" opacity="0.85"/>
      <text x="140" y="24" text-anchor="start" fill="#bd93f9" font-size="12" font-weight="bold">~15 Mbps</text>
    </g>

    <!-- === Bar 4: AV1 ~10 Mbps === -->
    <!-- log10(10) = 1.0, x = 1.0 * 114.3 = 114 -->
    <g transform="translate(0, 210)">
      <text x="-10" y="18" text-anchor="end" fill="#50fa7b" font-size="13" font-weight="bold">AV1</text>
      <rect x="0" y="4" width="114" height="28" rx="4" fill="url(#av1Bar)" opacity="0.85"/>
      <text x="120" y="24" text-anchor="start" fill="#50fa7b" font-size="12" font-weight="bold">~10 Mbps</text>
    </g>

    <!-- Compression ratio annotations -->
    <!-- Arrow from Raw to AV1 -->
    <line x1="490" y1="29" x2="490" y2="228" stroke="#ff79c6" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="485" y1="29" x2="490" y2="29" stroke="#ff79c6" stroke-width="1.5"/>
    <line x1="485" y1="228" x2="490" y2="228" stroke="#ff79c6" stroke-width="1.5"/>
    <text x="502" y="115" text-anchor="start" fill="#ff79c6" font-size="13" font-weight="bold">1200x</text>
    <text x="502" y="132" text-anchor="start" fill="#ff79c6" font-size="11">compression</text>
  </g>
</svg>