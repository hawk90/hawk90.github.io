<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#282a36" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f8f8f2" font-size="18" font-weight="bold">Resolution Comparison</text>

  <!-- Scale: 8K = 7680x4320 maps to ~720x405 area, centered -->
  <!-- Scale factor: 720/7680 = 0.09375 -->
  <!-- Center offset: x=(800-720)/2=40, y=(500-405)/2+15=62.5 -->

  <!-- 8K: 7680x4320 -> 720x405 -->
  <rect x="40" y="55" width="720" height="405" fill="none" stroke="#bd93f9" stroke-width="2.5" rx="3"/>
  <text x="750" y="75" text-anchor="end" fill="#bd93f9" font-size="13" font-weight="bold">8K</text>
  <text x="750" y="92" text-anchor="end" fill="#bd93f9" font-size="10">7680 x 4320</text>
  <text x="750" y="106" text-anchor="end" fill="#bd93f9" font-size="10" opacity="0.7">~33.2M px</text>

  <!-- 4K: 3840x2160 -> 360x202.5 -->
  <rect x="40" y="55" width="360" height="202.5" fill="none" stroke="#ff79c6" stroke-width="2.5" rx="3"/>
  <text x="410" y="75" text-anchor="start" fill="#ff79c6" font-size="13" font-weight="bold">4K</text>
  <text x="410" y="92" text-anchor="start" fill="#ff79c6" font-size="10">3840 x 2160</text>
  <text x="410" y="106" text-anchor="start" fill="#ff79c6" font-size="10" opacity="0.7">~8.3M px</text>

  <!-- FHD: 1920x1080 -> 180x101.25 -->
  <rect x="40" y="55" width="180" height="101.25" fill="none" stroke="#8be9fd" stroke-width="2.5" rx="3"/>
  <text x="230" y="75" text-anchor="start" fill="#8be9fd" font-size="13" font-weight="bold">FHD</text>
  <text x="230" y="92" text-anchor="start" fill="#8be9fd" font-size="10">1920 x 1080</text>
  <text x="230" y="106" text-anchor="start" fill="#8be9fd" font-size="10" opacity="0.7">~2.1M px</text>

  <!-- HD: 1280x720 -> 120x67.5 -->
  <rect x="40" y="55" width="120" height="67.5" fill="none" stroke="#50fa7b" stroke-width="2.5" rx="3"/>
  <text x="170" y="140" text-anchor="start" fill="#50fa7b" font-size="13" font-weight="bold">HD</text>
  <text x="170" y="157" text-anchor="start" fill="#50fa7b" font-size="10">1280 x 720</text>
  <text x="170" y="171" text-anchor="start" fill="#50fa7b" font-size="10" opacity="0.7">~0.9M px</text>

  <!-- SD: 720x480 -> 67.5x45 -->
  <rect x="40" y="55" width="67.5" height="45" fill="none" stroke="#ffb86c" stroke-width="2.5" rx="3"/>
  <text x="50" y="140" text-anchor="start" fill="#ffb86c" font-size="13" font-weight="bold">SD</text>
  <text x="50" y="157" text-anchor="start" fill="#ffb86c" font-size="10">720 x 480</text>
  <text x="50" y="171" text-anchor="start" fill="#ffb86c" font-size="10" opacity="0.7">~0.35M px</text>

  <!-- Connecting lines from labels to rects -->
  <!-- SD -->
  <line x1="50" y1="130" x2="73.75" y2="100" stroke="#ffb86c" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- HD -->
  <line x1="170" y1="130" x2="160" y2="122.5" stroke="#50fa7b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Scale note -->
  <text x="400" y="485" text-anchor="middle" fill="#6272a4" font-size="11">Proportionally scaled -- SD to 8K spans ~100x in pixel count</text>
</svg>