<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Expression (root) -->
  <rect x="225" y="10" width="150" height="40" rx="5" fill="#6B46C1" stroke="#6B46C1" stroke-width="2"/>
  <text x="300" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">expression</text>

  <!-- glvalue -->
  <rect x="100" y="90" width="120" height="40" rx="5" fill="#9F7AEA" stroke="#9F7AEA" stroke-width="2"/>
  <text x="160" y="115" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">glvalue</text>

  <!-- rvalue -->
  <rect x="380" y="90" width="120" height="40" rx="5" fill="#9F7AEA" stroke="#9F7AEA" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">rvalue</text>

  <!-- lvalue -->
  <rect x="40" y="180" width="100" height="40" rx="5" fill="#B794F4" stroke="#B794F4" stroke-width="2"/>
  <text x="90" y="205" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">lvalue</text>

  <!-- xvalue (중앙) -->
  <rect x="250" y="180" width="100" height="40" rx="5" fill="#ED64A6" stroke="#ED64A6" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">xvalue</text>

  <!-- prvalue -->
  <rect x="460" y="180" width="100" height="40" rx="5" fill="#B794F4" stroke="#B794F4" stroke-width="2"/>
  <text x="510" y="205" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">prvalue</text>

  <!-- 연결선들 -->
  <!-- expression to glvalue -->
  <line x1="270" y1="50" x2="180" y2="90" stroke="#718096" stroke-width="2"/>

  <!-- expression to rvalue -->
  <line x1="330" y1="50" x2="420" y2="90" stroke="#718096" stroke-width="2"/>

  <!-- glvalue to lvalue -->
  <line x1="140" y1="130" x2="100" y2="180" stroke="#718096" stroke-width="2"/>

  <!-- glvalue to xvalue -->
  <line x1="180" y1="130" x2="270" y2="180" stroke="#718096" stroke-width="2"/>

  <!-- rvalue to xvalue -->
  <line x1="420" y1="130" x2="330" y2="180" stroke="#718096" stroke-width="2"/>

  <!-- rvalue to prvalue -->
  <line x1="460" y1="130" x2="500" y2="180" stroke="#718096" stroke-width="2"/>

  <!-- 범례 -->
  <text x="30" y="250" font-family="Arial, sans-serif" font-size="12" fill="#718096">
    <tspan x="30" dy="0">• glvalue = lvalue + xvalue (메모리에 실제 객체가 존재)</tspan>
    <tspan x="30" dy="18">• rvalue = xvalue + prvalue (move 가능한 값)</tspan>
    <tspan x="30" dy="18">• xvalue = glvalue ∩ rvalue (이동 가능한 객체)</tspan>
  </text>
</svg>