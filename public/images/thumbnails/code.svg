<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0b14"/>
      <stop offset="100%" style="stop-color:#16131f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bgGrad2)"/>

  <!-- Terminal window -->
  <g transform="translate(50, 30)">
    <rect width="300" height="165" rx="8" fill="#16131f" stroke="#2a2536"/>
    <rect width="300" height="28" rx="8" fill="#0d0b14"/>
    <rect y="20" width="300" height="8" fill="#0d0b14"/>

    <!-- Window controls -->
    <circle cx="16" cy="14" r="5" fill="#f38ba8"/>
    <circle cx="32" cy="14" r="5" fill="#e0af68"/>
    <circle cx="48" cy="14" r="5" fill="#9ece6a"/>

    <!-- Code lines -->
    <g transform="translate(16, 45)" font-family="monospace" font-size="12">
      <text y="0" fill="#6e6a7c">1</text>
      <text x="20" y="0" fill="#bb9af7">const</text>
      <text x="55" y="0" fill="#eeeef0"> data = </text>
      <text x="105" y="0" fill="#bb9af7">await</text>
      <text x="145" y="0" fill="#7dcfff"> fetch</text>
      <text x="175" y="0" fill="#e0af68">(</text>
      <text x="180" y="0" fill="#9ece6a">url</text>
      <text x="200" y="0" fill="#e0af68">)</text>

      <text y="22" fill="#6e6a7c">2</text>
      <text x="20" y="22" fill="#bb9af7">const</text>
      <text x="55" y="22" fill="#eeeef0"> json = </text>
      <text x="105" y="22" fill="#bb9af7">await</text>
      <text x="145" y="22" fill="#eeeef0"> data.</text>
      <text x="175" y="22" fill="#7dcfff">json</text>
      <text x="200" y="22" fill="#e0af68">()</text>

      <text y="44" fill="#6e6a7c">3</text>

      <text y="66" fill="#6e6a7c">4</text>
      <text x="20" y="66" fill="#bb9af7">return</text>
      <text x="60" y="66" fill="#eeeef0"> {</text>

      <text y="88" fill="#6e6a7c">5</text>
      <text x="20" y="88" fill="#eeeef0">  props: { json }</text>

      <text y="110" fill="#6e6a7c">6</text>
      <text x="20" y="110" fill="#eeeef0">}</text>
    </g>
  </g>

  <!-- Decorative elements -->
  <circle cx="370" cy="30" r="20" fill="#9d7cd8" opacity="0.15"/>
  <circle cx="30" cy="195" r="15" fill="#bb9af7" opacity="0.12"/>

  <!-- Cursor -->
  <rect x="232" y="140" width="2" height="14" fill="#bb9af7">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
