<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0b14"/>
      <stop offset="100%" style="stop-color:#16131f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d7cd8"/>
      <stop offset="100%" style="stop-color:#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bgGrad4)"/>

  <!-- Abstract geometric pattern -->
  <g opacity="0.12">
    <circle cx="100" cy="60" r="40" fill="#9d7cd8"/>
    <circle cx="300" cy="165" r="50" fill="#7dcfff"/>
    <rect x="280" y="40" width="60" height="60" rx="8" fill="#f38ba8" transform="rotate(15, 310, 70)"/>
    <polygon points="80,180 120,140 160,180" fill="#9ece6a"/>
  </g>

  <!-- Center icon - document/article -->
  <g transform="translate(200, 112.5)">
    <!-- Document shape -->
    <rect x="-40" y="-50" width="80" height="100" rx="6" fill="#211d2d" stroke="#2a2536" stroke-width="2"/>

    <!-- Folded corner -->
    <path d="M40,-50 L40,-30 L20,-50 Z" fill="#2a2536"/>
    <path d="M20,-50 L40,-30 L20,-30 Z" fill="#3d3650"/>

    <!-- Text lines -->
    <g fill="#6e6a7c">
      <rect x="-28" y="-30" width="40" height="6" rx="2"/>
      <rect x="-28" y="-18" width="56" height="4" rx="1"/>
      <rect x="-28" y="-8" width="56" height="4" rx="1"/>
      <rect x="-28" y="2" width="48" height="4" rx="1"/>
      <rect x="-28" y="16" width="56" height="4" rx="1"/>
      <rect x="-28" y="26" width="36" height="4" rx="1"/>
    </g>

    <!-- Accent dot -->
    <circle cx="20" cy="36" r="8" fill="url(#accentGrad)"/>
  </g>

  <!-- Decorative dots -->
  <g fill="#3d3650" opacity="0.5">
    <circle cx="50" cy="30" r="3"/>
    <circle cx="65" cy="30" r="3"/>
    <circle cx="50" cy="45" r="3"/>
    <circle cx="350" cy="195" r="3"/>
    <circle cx="365" cy="195" r="3"/>
    <circle cx="350" cy="210" r="3"/>
  </g>
</svg>
