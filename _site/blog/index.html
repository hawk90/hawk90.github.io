<!-- нҸ¬мҠӨнҠё лҚ°мқҙн„°лҘј JavaScriptлЎң м „лӢ¬ -->
<script>
const posts = [
  
];

// нҸҙлҚ” кө¬мЎ°лҘј нҠёлҰ¬лЎң ліҖнҷҳ
function buildCategoryTree(posts) {
  const tree = {};

  posts.forEach(post => {
    const pathParts = post.path.split('/').slice(1, -1); // _posts м ңкұ°, нҢҢмқјлӘ… м ңкұ°

    let current = tree;
    pathParts.forEach((part, index) => {
      if (!current[part]) {
        current[part] = {
          name: part,
          posts: [],
          children: {}
        };
      }

      if (index === pathParts.length - 1) {
        current[part].posts.push(post);
      }

      current = current[part].children;
    });
  });

  return tree;
}

// HTML мғқм„ұ
function renderTree(tree, level = 0) {
  let html = '<ul class="menu-list">';

  Object.keys(tree).sort().forEach(key => {
    const node = tree[key];
    const id = key.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
    const hasChildren = Object.keys(node.children).length > 0;
    const hasPosts = node.posts.length > 0;

    if (level === 0) {
      // л©”мқё м№ҙн…Ңкі лҰ¬
      html += `
        <li>
          <a href="#" class="has-text-weight-semibold category-toggle" data-category="${id}">
            рҹ“Ғ ${node.name}
          </a>
          <ul class="is-hidden" id="posts-${id}">
      `;

      // м„ңлёҢ м№ҙн…Ңкі лҰ¬
      if (hasChildren) {
        Object.keys(node.children).sort().forEach(childKey => {
          const child = node.children[childKey];
          const childId = childKey.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');

          html += `
            <li>
              <a href="#" class="category-toggle pl-3" data-category="${id}-${childId}">
                рҹ“Ӯ ${child.name}
              </a>
              <ul class="is-hidden pl-3" id="posts-${id}-${childId}">
          `;

          // м„ңлёҢ м№ҙн…Ңкі лҰ¬мқҳ нҸ¬мҠӨнҠёл“Ө
          child.posts.forEach(post => {
            html += `<li><a href="${post.url}" class="is-size-7">${post.title.substring(0, 30)}${post.title.length > 30 ? '...' : ''}</a></li>`;
          });

          html += `</ul></li>`;
        });
      }

      // л©”мқё м№ҙн…Ңкі лҰ¬ м§ҒмҶҚ нҸ¬мҠӨнҠёл“Ө
      node.posts.forEach(post => {
        html += `<li><a href="${post.url}" class="is-size-7">${post.title.substring(0, 30)}${post.title.length > 30 ? '...' : ''}</a></li>`;
      });

      html += `</ul></li>`;
    }
  });

  html += '</ul>';
  return html;
}

// кІҖмғү кё°лҠҘ
function searchPosts(query) {
  if (!query || query.length < 1) return [];

  // нҠ№мҲҳл¬ёмһҗ мқҙмҠӨмјҖмқҙн”„ мІҳлҰ¬
  const escapeRegex = (str) => {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  };

  const lowerQuery = query.toLowerCase();
  const escapedQuery = escapeRegex(lowerQuery);

  return posts.filter(post => {
    try {
      // м ңлӘ©м—җм„ң кІҖмғү
      const titleMatch = post.title.toLowerCase().includes(lowerQuery);

      // кІҪлЎңм—җм„ң кІҖмғү (C++ к°ҷмқҖ кІҪмҡ° мІҳлҰ¬)
      const pathMatch = post.path.toLowerCase().includes(lowerQuery) ||
                       post.path.toLowerCase().includes(escapedQuery);

      // нғңк·ём—җм„ң кІҖмғү
      const tagMatch = post.tags && Array.isArray(post.tags) &&
                      post.tags.some(tag =>
                        tag && typeof tag === 'string' &&
                        tag.toLowerCase().includes(lowerQuery)
                      );

      return titleMatch || pathMatch || tagMatch;
    } catch (e) {
      return false;
    }
  }).sort((a, b) => {
    // м ңлӘ© л§Өм№ӯмқ„ мҡ°м„ мҲңмң„лЎң м •л ¬
    const aTitle = a.title.toLowerCase().includes(lowerQuery) ? 0 : 1;
    const bTitle = b.title.toLowerCase().includes(lowerQuery) ? 0 : 1;
    return aTitle - bTitle;
  });
}

// кІҖмғү кІ°кіј н‘ңмӢң
function displaySearchResults(results) {
  const resultsDiv = document.getElementById('search-results');
  const resultsList = document.getElementById('search-results-list');
  const categoryTree = document.getElementById('category-tree');

  if (results.length === 0 && document.getElementById('search-box').value.length > 0) {
    resultsDiv.classList.remove('is-hidden');
    categoryTree.classList.add('is-hidden');
    resultsList.innerHTML = '<li><span class="has-text-grey">кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ.</span></li>';
  } else if (results.length > 0) {
    resultsDiv.classList.remove('is-hidden');
    categoryTree.classList.add('is-hidden');

    let html = '';
    results.forEach(post => {
      const category = post.path.split('/').slice(1, -1).join(' > ');
      html += `
        <li>
          <a href="${post.url}">
            <strong>${highlightText(post.title, document.getElementById('search-box').value)}</strong>
            <br>
            <span class="is-size-7 has-text-grey">${category}</span>
          </a>
        </li>
      `;
    });
    resultsList.innerHTML = html;
  } else {
    resultsDiv.classList.add('is-hidden');
    categoryTree.classList.remove('is-hidden');
  }
}

// н…ҚмҠӨнҠё н•ҳмқҙлқјмқҙнҠё
function highlightText(text, query) {
  if (!query) return text;
  try {
    // нҠ№мҲҳл¬ёмһҗ мқҙмҠӨмјҖмқҙн”„
    const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escapedQuery})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  } catch (e) {
    return text;
  }
}

// нҺҳмқҙм§Җ лЎңл“ң мӢң мӢӨн–ү
document.addEventListener('DOMContentLoaded', function() {
  // м№ҙн…Ңкі лҰ¬ нҠёлҰ¬ мҙҲкё°нҷ”
  const tree = buildCategoryTree(posts);
  const treeHtml = renderTree(tree);
  document.getElementById('category-tree').innerHTML = treeHtml;

  // кІҖмғү мқҙлІӨнҠё м„Өм •
  const searchBox = document.getElementById('search-box');
  if (searchBox) {
    let searchTimeout;

    searchBox.addEventListener('input', function(e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = e.target.value.trim();

        if (query && query.length >= 1) {  // 1кёҖмһҗл¶Җн„° кІҖмғү
          const results = searchPosts(query);
          displaySearchResults(results);
        } else {
          displaySearchResults([]);
        }
      }, 200); // 200msлЎң мӨ„мһ„
    });

    // ESC нӮӨлЎң кІҖмғү мҙҲкё°нҷ”
    searchBox.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        this.value = '';
        displaySearchResults([]);
      }
    });
  }

  // нҶ кёҖ кё°лҠҘ - мқҙлІӨнҠё мң„мһ„ мӮ¬мҡ©
  document.addEventListener('click', function(e) {
    if (e.target && e.target.classList && e.target.classList.contains('category-toggle')) {
      e.preventDefault();
      const category = e.target.dataset.category;
      const postsList = document.getElementById('posts-' + category);

      if (postsList) {
        postsList.classList.toggle('is-hidden');
      }
    }
  });
});
</script>
